[build]
  publish = "."
  functions = "netlify/functions"

# Optional dev settings
[dev]
  command = "" # static
  framework = "#static"
  targetPort = 0

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
